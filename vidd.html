<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Video UI</title>

  <!-- WAJIB untuk mobile -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background-color: #0f0f0f;
      font-family: Arial, sans-serif;
      color: white;
    }

    /* ================= HEADER ================= */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 12px;
      background-color: #1a1a1a;
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .logo {
      font-weight: bold;
      font-size: 16px;
    }

    .upload-btn {
      background-color: #2d6cdf;
      padding: 6px 12px;
      border-radius: 8px;
      color: white;
      border: none;
      font-size: 14px;
      cursor: pointer;
    }

    /* ================= ADS ================= */
    .ads {
      padding: 10px 15px;
      color: #aaa;
      font-size: 14px;
    }

    /* ================= VIDEO ================= */
    .video-container {
      position: relative;
      margin: 20px auto;
      width: 90%;
      max-width: 420px;
      aspect-ratio: 9 / 16;
      border-radius: 15px;
      overflow: hidden;
      background-color: black;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Tombol play */
    .play-btn {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 65px;
      height: 65px;
      background-color: rgba(255,255,255,0.85);
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
    }

    .play-btn::after {
      content: '';
      border-left: 18px solid black;
      border-top: 10px solid transparent;
      border-bottom: 10px solid transparent;
      margin-left: 4px;
    }

    /* ================= NAVBAR ================= */
    .navbar {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: #1a1a1a;
      display: flex;
      justify-content: space-around;
      padding: 10px 0;
    }

    .nav-item {
      font-size: 13px;
      color: white;
    }

    /* ================= MOBILE ================= */
    @media (max-width: 480px) {
      .logo {
        font-size: 14px;
      }

      .upload-btn {
        font-size: 12px;
        padding: 5px 10px;
      }

      .video-container {
        width: 95%;
      }
    }

  </style>
</head>

<body>

  <!-- HEADER -->
  <div class="header">
    <div class="logo">vldey.co</div>
    <button class="upload-btn">Upload</button>
  </div>

  <!-- ADS -->
  <div class="ads">Advertise</div>

  <!-- VIDEO -->
  <div class="video-container">
    <video id="video">
      <source src="vid.mp4" type="video/mp4">
    </video>

    <div class="play-btn" onclick="playVideo()"></div>
  </div>

  <!-- NAVBAR -->
  <div class="navbar">
    <div class="nav-item">Home</div>
    <div class="nav-item">Explore</div>
    <div class="nav-item">Saved</div>
    <div class="nav-item">Profile</div>
  </div>

  <script>
    function playVideo() {
      const video = document.getElementById("video");
      video.play();
      document.querySelector(".play-btn").style.display = "none";
    }
  </script>

</body>
</html>
